name: Update Registry

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: registry-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          node-version: "24"
          cache: true
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends poppler-utils
      - run: vp install --frozen-lockfile
      - name: Prepare update branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin automation/update-registry >/dev/null; then
            git fetch origin automation/update-registry
            git switch -C automation/update-registry origin/automation/update-registry
          else
            git switch -C automation/update-registry
          fi
      - run: bun run directory update
      - run: bun run directory:non-idrr
      - run: bun run check
      - name: Open update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "No registry changes."
            exit 0
          fi
          git add data schemas build/change-summary.md docs
          git commit -m "chore: update registry data"
          git push origin automation/update-registry
          if gh pr view automation/update-registry --json url --jq .url >/tmp/update-pr-url 2>/dev/null; then
            gh pr edit automation/update-registry --body-file build/change-summary.md
            echo "Updated pull request $(cat /tmp/update-pr-url)."
            exit 0
          fi

          if gh pr create \
            --title "chore: update registry data" \
            --body-file build/change-summary.md \
            --base "${{ github.event.repository.default_branch }}" \
            --head automation/update-registry \
            --draft; then
            exit 0
          fi

          {
            echo "## Registry update branch pushed"
            echo
            echo "GitHub did not allow this workflow token to create a pull request."
            echo
            echo "Create one manually from \`automation/update-registry\` into \`${{ github.event.repository.default_branch }}\`."
          } >> "$GITHUB_STEP_SUMMARY"
