name: Update Registry

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: registry-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1
        with:
          node-version: "24"
          cache: true
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends poppler-utils
      - run: vp install --frozen-lockfile
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      # The pipeline runs on the checked-out default branch on purpose: the change report
      # diffs the rebuilt registry against HEAD (the default branch), and the code executed
      # is always the default branch's. Switching to the long-lived automation branch first
      # would run that branch's stale code and diff against its stale data, marking every
      # record as "Added". The result is published to the automation branch afterwards.
      - run: bun run directory update
      - run: bun run directory:non-idrr
      - run: bun run check
      - name: Open update pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "No registry changes."
            exit 0
          fi
          # Publish on a branch based on the current default-branch commit so the PR diff is
          # always default-branch -> update. Reset (force) it each run: every run is a full
          # rebuild, so the latest data is authoritative and the branch never carries stale code.
          git switch -C automation/update-registry
          git add data schemas build/change-summary.md docs
          git commit -m "chore: update registry data"
          git push --force origin automation/update-registry
          existing_pr=$(gh pr list --head automation/update-registry --state open --json url --jq '.[0].url // ""')
          if [ -n "$existing_pr" ]; then
            gh pr edit automation/update-registry --body-file build/change-summary-pr.md
            echo "Updated pull request $existing_pr."
            exit 0
          fi

          if gh pr create \
            --title "chore: update registry data" \
            --body-file build/change-summary-pr.md \
            --base "${{ github.event.repository.default_branch }}" \
            --head automation/update-registry \
            --draft; then
            exit 0
          fi

          {
            echo "## Registry update branch pushed"
            echo
            echo "GitHub did not allow this workflow token to create a pull request."
            echo
            echo "Create one manually from \`automation/update-registry\` into \`${{ github.event.repository.default_branch }}\`."
          } >> "$GITHUB_STEP_SUMMARY"
